name: Generate site and push to GitHub pages branch

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  generate_and_commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Checkout website repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: master

      # This action seems broken for now :(
      # Error: getCacheEntry failed: This legacy service is shutting down, effective April 15, 2025. Migrate to the new service ASAP. For more information: https://gh.io/gha-cache-sunset
      # - name: Install elm
      #   uses: justgook/setup-elm@1.3.0
      #   with:
      #     elm-version: '0.19.1'

      # - name: Install node
      #   uses: actions/setup-node@v3
      #   with:
      #     node-version: 16

      - name: Clone pushpin
        uses: actions/checkout@v3
        with:
          repository: tedbauer/pushpin
          ref: master
          path: cloned-repo

      # - name: Clone pocket symphony
      #   uses: actions/checkout@v3
      #   with:
      #     repository: tedbauer/pocket-symphony
      #     ref: main
      #     path: pocket-symphony-repo

      # - name: Build pocket symphony
      #   working-directory: pocket-symphony-repo
      #   run: |
      #     npm install --save-dev ts-loader
      #     make build

      # - name: Move pocket symphony files to another dir
      #   working-directory: pocket-symphony-repo
      #   run: |
      #     cp index.html ../pocket-symphony.html
      #     cp main.js ../main.js
      #     cp stylesheet.css ../stylesheet.css
      #     mkdir -p ../dist
      #     cp dist/main.js ../dist/main.js

      - name: Build, install, and run pushpin
        working-directory: cloned-repo
        run: |
          cargo build --release
          PUSHPIN_PATH=$(pwd)/target/release/pushpin
          echo "PUSHPIN_PATH=$PUSHPIN_PATH" >> $GITHUB_ENV
          cd ..
          $PUSHPIN_PATH generate

      - name: Remove pushpin local clone
        run: |
          cp $PUSHPIN_PATH /usr/local/bin/pushpin
          PUSHPIN_PATH=/usr/local/bin/pushpin
          echo "PUSHPIN_PATH=$PUSHPIN_PATH" >> $GITHUB_ENV
          rm -rf cloned-repo

      - name: Clone Shrimp (emulator)
        uses: actions/checkout@v3
        with:
          repository: tedbauer/emulator
          ref: master
          path: emulator-repo

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Build Shrimp WASMs
        working-directory: emulator-repo
        run: |
          wasm-pack build compiler --target web --out-dir ../web/compiler_pkg -- --features wasm
          wasm-pack build --target web --out-dir web/pkg

      - name: Copy Shrimp web files
        run: |
          mkdir -p shrimp/compiler_pkg shrimp/pkg
          cp emulator-repo/web/index.html shrimp/
          cp emulator-repo/web/index.js shrimp/
          cp emulator-repo/web/compiler_pkg/compiler.js shrimp/compiler_pkg/
          cp emulator-repo/web/compiler_pkg/compiler_bg.wasm shrimp/compiler_pkg/
          cp emulator-repo/web/pkg/emulator.js shrimp/pkg/
          cp emulator-repo/web/pkg/emulator_bg.wasm shrimp/pkg/

      - name: Generate Shrimp docs with Pushpin
        working-directory: emulator-repo/docs-site
        run: |
          $PUSHPIN_PATH generate
          mkdir -p ../../shrimp/docs
          cp -r docs/* ../../shrimp/docs/

      - name: Remove emulator local clone
        run: rm -rf emulator-repo

      - name: Commit changes and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Automated file generation" --allow-empty
          git push https://${{ secrets.ACCESS_TOKEN }}@github.com/tedbauer/tedbauer.github.io HEAD:gh-pages --force
